<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Robot Jungle - El Taller de la Selva</title>
<style>
* { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  width: 100%; 
  height: 100%; 
  overflow: hidden; 
  background: #050a05; 
  font-family: 'Courier New', monospace; 
  display: flex; 
  flex-direction: column; 
  justify-content: center; /* Centrado vertical */
  align-items: center; 
}
#game-container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}
#wrap { 
  position: relative; 
  width: 100%; 
  margin: 0 auto;
}
#c { 
  display: block; 
  width: 100%; 
  height: auto; 
  border: 3px solid #1a331a; 
  border-radius: 0px; 
  box-shadow: 0 0 40px rgba(0,200,100,0.15); 
}
#rotate-msg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(5, 15, 5, 0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: #a5d6a5;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  flex-direction: column;
  backdrop-filter: blur(8px);
}
#rotate-msg span {
  font-size: 48px;
  margin-bottom: 20px;
  animation: rotateIcon 2s infinite;
}
@keyframes rotateIcon {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(-90deg); }
  75% { transform: rotate(-90deg); }
  100% { transform: rotate(0deg); }
}
#hud { 
  position: absolute; 
  top: 12px; 
  left: 12px; 
  right: 12px; 
  display: none; 
  pointer-events: none; 
  flex-direction: row; 
  justify-content: space-between; 
  align-items: flex-start; 
  gap: 8px; 
  z-index: 15;
}
.hud-box { 
  background: rgba(0,0,0,0.7); 
  border: 2px solid rgba(100,220,120,0.5); 
  border-radius: 10px; 
  padding: 8px 14px; 
  color: #fff; 
  line-height: 1.4; 
  font-weight: bold; 
  letter-spacing: 1px; 
  backdrop-filter: blur(4px);
  min-width: 100px;
}
.hud-label { 
  font-size: 11px; 
  color: #80cbc4; 
  font-weight: normal; 
  letter-spacing: 2px; 
  display: block; 
  margin-bottom: 2px; 
  text-transform: uppercase;
}
.hud-val { 
  font-size: 20px; 
  font-weight: bold; 
}
#barra-bat { 
  width: 160px; 
  height: 12px; 
  background: #1a2a1a; 
  border-radius: 6px; 
  margin-top: 4px; 
  border: 1px solid rgba(100,220,120,0.3); 
  overflow: hidden;
}
#fill-bat { 
  height: 12px; 
  border-radius: 6px; 
  background: linear-gradient(90deg, #3498db, #2ecc71);
  width: 100%; 
  transition: width 0.3s, background 0.3s; 
}
#msg { 
  position: absolute; 
  top: 40%; 
  left: 50%; 
  transform: translate(-50%,-50%); 
  font-size: 20px; 
  font-weight: bold; 
  pointer-events: none; 
  display: none; 
  text-align: center; 
  text-shadow: 2px 2px #000; 
  border-radius: 8px; 
  padding: 10px 20px; 
  white-space: nowrap; 
  z-index: 10; 
}
#score-pop { 
  position: absolute; 
  pointer-events: none; 
  font-size: 24px; 
  font-weight: bold; 
  color: #f1c40f; 
  text-shadow: 2px 2px #000; 
  display: none; 
  z-index: 20; 
  transition: none; 
}

/* Controles reposicionados */
#ctrl { 
  width: 100%;
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  padding: 8px 16px; 
  z-index: 30; 
  pointer-events: none;
  background: transparent;
  margin-top: 8px;
}
.ctrl-group {
  display: flex;
  gap: 12px;
  pointer-events: auto;
}
.btn-ctrl { 
  width: 65px; 
  height: 65px; 
  background: rgba(20,30,20,0.75); 
  border: 3px solid rgba(180,220,100,0.6); 
  border-radius: 50%; 
  color: #e0f0e0; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  font-size: 30px; 
  font-weight: bold;
  pointer-events: auto; 
  backdrop-filter: blur(4px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: transform 0.05s, background 0.1s;
}
.btn-ctrl:active {
  background: rgba(46,204,113,0.4);
  transform: scale(0.9);
  border-color: #aaffaa;
}

/* HUD responsive */
@media (max-width: 600px) {
  .hud-box { padding: 5px 8px; min-width: 70px; }
  .hud-label { font-size: 8px; }
  .hud-val { font-size: 14px; }
  #barra-bat { width: 100px; height: 8px; }
  #fill-bat { height: 8px; }
  .btn-ctrl { width: 55px; height: 55px; font-size: 26px; }
  #ctrl { padding: 6px 12px; }
  #msg { font-size: 14px; }
  #score-pop { font-size: 18px; }
}

@media (pointer: coarse) { 
  #ctrl { display: flex !important; } 
}
@media (pointer: fine) {
  #ctrl { display: none !important; }
}
</style>
</head>
<body>
<div id="game-container">
  <div id="rotate-msg">
    <span>📱 → ↻</span>
    🌿 GIRA LA PANTALLA 🌿<br>
    <span style="font-size:14px; margin-top:15px; color:#80cbc4;">Juega en horizontal</span>
  </div>

  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="hud">
      <div class="hud-box">
        <span class="hud-label">❤️ VIDAS</span>
        <span class="hud-val" id="vidas">❤️❤️❤️</span>
      </div>
      <div class="hud-box" style="text-align:center;">
        <span class="hud-label">🔋 BATERÍA</span>
        <span class="hud-val" id="bpct">100%</span>
        <div id="barra-bat"><div id="fill-bat"></div></div>
      </div>
      <div class="hud-box" style="text-align:center; border-color: rgba(241,196,15,0.6);">
        <span class="hud-label">🏆 PUNTOS</span>
        <span class="hud-val" id="score" style="color:#f1c40f;">0</span>
      </div>
      <div class="hud-box" style="text-align:right;">
        <span class="hud-label">🌿 FASE</span>
        <span class="hud-val" id="fase">1</span>
      </div>
    </div>
    <div id="msg"></div>
    <div id="score-pop">+100</div>
  </div>

  <div id="ctrl">
    <div class="ctrl-group">
      <div class="btn-ctrl" id="bL">◀</div>
      <div class="btn-ctrl" id="bR">▶</div>
    </div>
    <div class="btn-ctrl" id="bU" style="background:rgba(46,204,113,0.3); border-color:rgba(46,204,113,0.8);">▲</div>
  </div>
</div>

<script>
// Detección de móvil
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                 ('ontouchstart' in window) || 
                 (navigator.maxTouchPoints > 0);

const rotateMsg = document.getElementById('rotate-msg');
let isLandscape = true;

function checkOrientation() {
  if (!isMobile) {
    rotateMsg.style.display = 'none';
    isLandscape = true;
    return;
  }
  
  const newIsLandscape = window.innerWidth > window.innerHeight;
  if (newIsLandscape !== isLandscape) {
    isLandscape = newIsLandscape;
    if (!isLandscape) {
      rotateMsg.style.display = 'flex';
      if (active) {
        cancelAnimationFrame(raf2);
        active = false;
      }
    } else {
      rotateMsg.style.display = 'none';
      if (!active && vidas > 0) {
        active = true;
        loop();
      }
    }
    resize();
  }
}

window.addEventListener('load', () => {
  checkOrientation();
  resize();
});

window.addEventListener('resize', () => { 
  checkOrientation(); 
  resize(); 
});

window.addEventListener('orientationchange', () => { 
  setTimeout(() => {
    checkOrientation();
    resize();
  }, 50); 
});

// ── AUDIO ENGINE ──────────────────────────────────────────────────────────────
let AC = null;

function getAC() {
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}

function unlockAudio() {
  const ac = getAC();
  if (!ac) return;
  const buf = ac.createBuffer(1, 1, 22050);
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(ac.destination);
  src.start(0);
  if (ac.state === 'suspended') ac.resume();
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('touchend', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, { passive: true });
document.addEventListener('touchend', unlockAudio, { passive: true });
document.addEventListener('click', unlockAudio);

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  try {
    const ac = getAC(); if (!ac) return;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    gain.gain.setValueAtTime(vol, ac.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + duration);
  } catch(e) {}
}

function sfxDamage() {
  playTone(180,'sawtooth',0.12,0.35); playTone(120,'sawtooth',0.15,0.3,0.06);
}
function sfxDead() {
  playTone(100,'sawtooth',0.3,0.4); playTone(80,'square',0.4,0.35,0.1); playTone(60,'sawtooth',0.5,0.3,0.2);
}
function sfxBattery() {
  playTone(440,'sine',0.08,0.25); playTone(550,'sine',0.08,0.25,0.07); playTone(660,'sine',0.1,0.25,0.14); playTone(880,'sine',0.12,0.2,0.22);
}
function sfxExtraLife() {
  [523,659,784,1047].forEach((f,i) => playTone(f,'sine',0.15,0.3,i*0.1));
}
function sfxWorkshop() {
  [330,440,550,660,880,1100].forEach((f,i) => playTone(f,i<3?'sine':'triangle',i<3?0.1:0.15+i*0.02,i<3?0.25:0.28,[0,0.1,0.2,0.3,0.48,0.65][i]));
}
function sfxJump() {
  try {
    const ac = getAC(); if (!ac) return;
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(220, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ac.currentTime + 0.1);
    g.gain.setValueAtTime(0.15, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(); osc.stop(ac.currentTime + 0.18);
  } catch(e) {}
}
function sfxStomp() {
  playTone(200,'square',0.05,0.3); playTone(400,'square',0.08,0.25,0.04);
}
function sfxScore(pts) {
  const base = pts >= 200 ? 660 : pts >= 150 ? 550 : 440;
  playTone(base,'sine',0.06,0.2); playTone(base*1.5,'sine',0.08,0.18,0.06);
}
function sfxProjectile() {
  playTone(300,'sawtooth',0.05,0.15); playTone(200,'sawtooth',0.07,0.12,0.04);
}
function sfxFire() {
  playTone(150,'sawtooth',0.06,0.2); playTone(100,'sawtooth',0.08,0.18,0.03);
}
function sfxBird() {
  playTone(800,'sawtooth',0.08,0.15); playTone(600,'sawtooth',0.1,0.12,0.06);
}

// ── MÚSICA AMBIENTAL ────────────────────────────────────────────────────────
let musicNodes = [];
let musicPlaying = false;

function startJungleMusic() {
  if (musicPlaying) return;
  const ac = getAC(); if (!ac) return;
  musicPlaying = true;

  function schedWind() {
    if (!musicPlaying) return;
    const ac2 = getAC(); if (!ac2) return;
    try {
      const bufferSize = 4096;
      const node = ac2.createScriptProcessor(bufferSize, 1, 1);
      const gain = ac2.createGain();
      const filter = ac2.createBiquadFilter();
      
      filter.type = 'bandpass';
      filter.frequency.value = 400 + Math.random() * 300;
      filter.Q.value = 0.6;
      
      gain.gain.setValueAtTime(0.02, ac2.currentTime);
      
      node.onaudioprocess = function(e) {
        const output = e.outputBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = (Math.random() * 2 - 1) * 0.4;
        }
      };
      
      node.connect(filter);
      filter.connect(gain);
      gain.connect(ac2.destination);
      
      const id = setTimeout(() => {
        try { node.disconnect(); } catch(e) {}
        if (musicPlaying) schedWind();
      }, 10000 + Math.random() * 8000);
      
      musicNodes.push({ node, gain, filter, cancel: () => clearTimeout(id) });
    } catch(e) {}
  }

  function schedBird() {
    if (!musicPlaying) return;
    const ac3 = getAC(); if (!ac3) return;
    try {
      const osc = ac3.createOscillator();
      const gain = ac3.createGain();
      osc.type = 'sine';
      
      const now = ac3.currentTime;
      const baseFreq = 1200 + Math.random() * 800;
      osc.frequency.setValueAtTime(baseFreq, now);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, now + 0.08);
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      
      osc.connect(gain);
      gain.connect(ac3.destination);
      
      osc.start(now);
      osc.stop(now + 0.15);
    } catch(e) {}
    
    const wait = 3000 + Math.random() * 7000;
    const id = setTimeout(() => schedBird(), wait);
    musicNodes.push({ cancel: () => clearTimeout(id) });
  }

  function schedWolf() {
    if (!musicPlaying) return;
    const ac4 = getAC(); if (!ac4) return;
    try {
      const osc = ac4.createOscillator();
      const gain = ac4.createGain();
      const now = ac4.currentTime;
      
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.linearRampToValueAtTime(280, now + 0.8);
      osc.frequency.linearRampToValueAtTime(200, now + 1.6);
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, now + 0.3);
      gain.gain.linearRampToValueAtTime(0.06, now + 1.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      osc.connect(gain);
      gain.connect(ac4.destination);
      
      osc.start(now);
      osc.stop(now + 2.0);
    } catch(e) {}
    
    const wait = 15000 + Math.random() * 20000;
    const id = setTimeout(() => schedWolf(), wait);
    musicNodes.push({ cancel: () => clearTimeout(id) });
  }

  function schedCricket() {
    if (!musicPlaying) return;
    const ac5 = getAC(); if (!ac5) return;
    for (let i = 0; i < 4; i++) {
      try {
        const osc = ac5.createOscillator();
        const gain = ac5.createGain();
        osc.type = 'square';
        osc.frequency.value = 800 + Math.random() * 400;
        
        const now = ac5.currentTime + i * 0.06;
        gain.gain.setValueAtTime(0.015, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        
        osc.connect(gain);
        gain.connect(ac5.destination);
        
        osc.start(now);
        osc.stop(now + 0.05);
      } catch(e) {}
    }
    const wait = 4000 + Math.random() * 6000;
    const id = setTimeout(() => schedCricket(), wait);
    musicNodes.push({ cancel: () => clearTimeout(id) });
  }

  schedWind();
  schedBird();
  schedWolf();
  schedCricket();
}

function stopJungleMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { 
    try { 
      if (n.node) n.node.disconnect();
      if (n.gain) n.gain.disconnect();
      if (n.cancel) n.cancel();
    } catch(e){} 
  });
  musicNodes = [];
}

// ── CANVAS ────────────────────────────────────────────────────────────────────
const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
cvs.width = 1100; cvs.height = 520;

function resize() {
  const wrap = document.getElementById('wrap');
  const winWidth = window.innerWidth;
  const winHeight = window.innerHeight;
  
  const targetRatio = 1100 / 520;
  let canvasWidth = winWidth;
  let canvasHeight = canvasWidth / targetRatio;
  
  const ctrlHeight = document.getElementById('ctrl').offsetHeight || 80;
  const maxWidth = isMobile ? winWidth * 0.95 : Math.min(winWidth * 0.9, 1400);
  const maxHeight = isMobile ? winHeight - ctrlHeight - 30 : Math.min(winHeight * 0.85, 700);
  
  canvasWidth = Math.min(canvasWidth, maxWidth);
  canvasHeight = Math.min(canvasHeight, maxHeight);
  
  if (canvasHeight > maxHeight) {
    canvasHeight = maxHeight;
    canvasWidth = canvasHeight * targetRatio;
  }
  
  wrap.style.width = canvasWidth + 'px';
  wrap.style.height = canvasHeight + 'px';
}

// ── CONTROLES ─────────────────────────────────────────────────────────────────
const K = {};
['bL','bR','bU'].forEach((id, i) => {
  const keys = ['ArrowLeft','ArrowRight','ArrowUp'];
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); K[keys[i]] = true; unlockAudio(); }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); K[keys[i]] = false; }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); K[keys[i]] = false; }, { passive: false });
});
window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (e.code === 'Enter' && !active) start();
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => K[e.code] = false);

// ── ESTADO ────────────────────────────────────────────────────────────────────
let active = false, fr = 0, camX = 0, vidas = 3, bat = 100, fase = 1, score = 0;
let shake = 0, flash = 0, invulnerable = 0;
let particles = [], stars = [], titleFr = 0, titleRaf, raf2;
let scorePops = [];
let distanceSigns = [];
let sharks = [];
let birds = [];

const POINTS = { boar: 100, snake: 150, lion: 200, bear: 250, bird: 200, plant: 0 };

const R = { x: 60, y: 250, w: 38, h: 50, vx: 0, vy: 0, spd: 0.95, fri: 0.83, jmp: 13.5, grav: 0.6, land: false, dir: 1 };
let platforms = [], enemies = [], batteries = [], clouds = [], fish = [];
let plants = [], fires = [], projectiles = [];
let meta = { x: 0, y: 0, w: 100, h: 125 };

for (let i = 0; i < 80; i++) stars.push({ x: Math.random() * 3500, y: Math.random() * 130, s: Math.random() * 1.8 + 0.5, t: Math.random() * Math.PI * 2 });

// ── PORTADA ───────────────────────────────────────────────────────────────────
function drawTitleScreen() {
  titleFr++;
  const W = 1100, H = 520;
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#050d1a'); sky.addColorStop(0.6, '#0d2a10'); sky.addColorStop(1, '#071407');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  for (let s of stars) {
    let flicker = 0.4 + 0.6 * Math.sin(titleFr * 0.04 + s.t);
    ctx.globalAlpha = flicker * 0.8; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc((s.x * 0.28) % W, s.y * 0.65, s.s * 0.8, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.arc(880, 70, 38, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#071407'; ctx.beginPath(); ctx.arc(895, 62, 31, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#071a07';
  for (let i = 0; i < 30; i++) { let tx = i * 42, th = 90 + Math.sin(i * 1.7) * 55; ctx.beginPath(); ctx.moveTo(tx, H); ctx.lineTo(tx + 4, H - th - 30); ctx.quadraticCurveTo(tx + 21, H - th - 80, tx + 38, H - th - 30); ctx.lineTo(tx + 42, H); ctx.fill(); }
  ctx.fillStyle = '#0b2b0b';
  for (let i = 0; i < 22; i++) { let tx = i * 56, th = 60 + Math.sin(i * 2.3) * 40; ctx.beginPath(); ctx.moveTo(tx, H); ctx.lineTo(tx + 8, H - th - 10); ctx.quadraticCurveTo(tx + 28, H - th - 55, tx + 50, H - th - 10); ctx.lineTo(tx + 56, H); ctx.fill(); }
  ctx.fillStyle = '#0d3b0d';
  for (let i = 0; i < 14; i++) { let tx = i * 90 - 20, th = 50 + Math.sin(i * 1.1) * 30; ctx.beginPath(); ctx.moveTo(tx, H); ctx.lineTo(tx + 10, H - th); ctx.quadraticCurveTo(tx + 35, H - th - 40, tx + 60, H - th); ctx.lineTo(tx + 70, H); ctx.fill(); }
  drawLeaves(30, 360, 1); drawLeaves(980, 370, -1);
  const fog = ctx.createLinearGradient(0, H - 90, 0, H);
  fog.addColorStop(0, 'rgba(10,40,10,0)'); fog.addColorStop(1, 'rgba(10,50,10,0.85)');
  ctx.fillStyle = fog; ctx.fillRect(0, H - 90, W, 90);
  ctx.fillStyle = '#0c300c'; ctx.fillRect(0, H - 28, W, 28);
  for (let i = 0; i < 18; i++) {
    let fx = (i * 73 + titleFr * 0.4 + Math.sin(i) * 50) % W, fy = 300 + Math.sin(titleFr * 0.03 + i * 1.2) * 60;
    let glow = 0.4 + 0.6 * Math.sin(titleFr * 0.08 + i * 0.9);
    ctx.globalAlpha = glow * 0.85; ctx.fillStyle = '#ccff44';
    ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = glow * 0.22; ctx.beginPath(); ctx.arc(fx, fy, 7, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  drawTitleRobot(480, 335);
  ctx.save(); ctx.textAlign = 'center';
  ctx.font = 'bold 62px Courier New'; ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillText('ROBOT JUNGLE', W / 2 + 4, 108);

// ── MUNDO ─────────────────────────────────────────────────────────────────────
function buildWorld(f) {
  const L = 3000 + f * 1000;
  platforms = [{ x: 0, y: 430, w: 750, type: 'grass' }];
  enemies = []; batteries = []; plants = []; fires = []; projectiles = [];
  distanceSigns = [];
  sharks = [];
  birds = [];

  let cx = 820;
  while (cx < L) {
    let gap = 100 + Math.random() * 120, w = 200 + Math.random() * 320, y = 290 + Math.random() * 110;
    let type = Math.random() > 0.5 ? 'grass' : 'stone';
    platforms.push({ x: cx, y, w, type });
    if (Math.random() > 0.38) batteries.push({ x: cx + w / 2 - 10, y: y - 52, got: false, bob: Math.random() * Math.PI * 2 });

    if (Math.random() > 0.5) {
      const types = ['boar', 'snake', 'lion', 'bear'], weights = [0.3, 0.25, 0.25, 0.2];
      let r = Math.random(), cum = 0, t = 'boar';
      for (let i = 0; i < types.length; i++) { cum += weights[i]; if (r < cum) { t = types[i]; break; } }
      enemies.push({ x: cx + 60, y: y - 44, w: 46, h: 44, d: 1, lL: cx, lR: cx + w - 48, t, hit: 0 });
    }

    if (w > 250 && Math.random() > 0.75) {
      const px = cx + 30 + Math.random() * (w - 80);
      plants.push({ x: px, y: y - 60, w: 30, h: 60, shootTimer: Math.floor(Math.random() * 180), shootInterval: 120 + Math.floor(Math.random() * 80), open: false, openTimer: 0 });
    }

    if (Math.random() > 0.6) {
      const fx = cx + 60 + Math.random() * (w - 120);
      fires.push({ x: fx, y: y - 36, w: 36, h: 36, frame: Math.floor(Math.random() * 30) });
    }

    cx += w + gap;
  }

  let targetDistances = [200, 400, 600, 800];
  for (let dist of targetDistances) {
    let targetX = dist * 2.5;
    let bestPlatform = null;
    let minDist = Infinity;
    for (let p of platforms) {
      if (p.x > targetX - 100 && p.x < targetX + 200) {
        let d = Math.abs(p.x + p.w/2 - targetX);
        if (d < minDist) {
          minDist = d;
          bestPlatform = p;
        }
      }
    }
    if (bestPlatform) {
      let signX = Math.min(bestPlatform.x + bestPlatform.w - 80, Math.max(bestPlatform.x + 40, targetX));
      distanceSigns.push({ 
        distance: dist, 
        x: signX, 
        y: bestPlatform.y - 40
      });
    }
  }

  for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
    sharks.push({
      x: 500 + Math.random() * L,
      y: 470,
      speed: 0.3 + Math.random() * 0.5,
      direction: Math.random() > 0.5 ? 1 : -1,
      finOffset: Math.random() * Math.PI * 2
    });
  }

  let numBirds = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < numBirds; i++) {
    birds.push({
      x: 400 + Math.random() * (L - 800),
      y: 100 + Math.random() * 150,
      vx: 1.5 + Math.random() * 2,
      vy: 0.5 + Math.random(),
      w: 40, h: 30,
      angle: 0,
      hit: 0,
      pattern: Math.random() > 0.5 ? 'circle' : 'dive'
    });
  }

  let lp = platforms[platforms.length - 1];
  meta.x = lp.x + lp.w - 110; meta.y = lp.y - meta.h;
  clouds = []; fish = [];
  for (let i = 0; i < 22; i++) clouds.push({ x: Math.random() * L, y: 20 + Math.random() * 100, w: 70 + Math.random() * 50 });
  for (let i = 0; i < 25; i++) fish.push({ x: Math.random() * L, y: 455 + Math.random() * 15, v: 0.9 + Math.random() * 1.3, s: Math.random() > 0.5 ? 1 : -1 });
}

// ── UI ────────────────────────────────────────────────────────────────────────
function start() {
  if (isMobile && !isLandscape) {
    rotateMsg.style.display = 'flex';
    return;
  }
  cancelAnimationFrame(titleRaf);
  unlockAudio(); getAC();
  active = true; vidas = 3; bat = 100; camX = 0; fase = 1; score = 0; invulnerable = 0;
  R.x = 60; R.y = 200; R.vx = 0; R.vy = 0; particles = []; scorePops = [];
  buildWorld(fase);
  document.getElementById('hud').style.display = 'flex';
  updateUI();
  startJungleMusic();
  loop();
}

function heartsStr(n) { let s = ''; for (let i = 0; i < Math.max(0, n); i++) s += '❤️'; return s || '💀'; }

function updateUI() {
  document.getElementById('vidas').innerText = heartsStr(vidas);
  document.getElementById('fase').innerText = fase;
  document.getElementById('bpct').innerText = bat + '%';
  document.getElementById('score').innerText = score;
  const f = document.getElementById('fill-bat');
  f.style.width = bat + '%';
  if (bat > 60) f.style.background = 'linear-gradient(90deg, #3498db, #2ecc71)';
  else if (bat > 30) f.style.background = 'linear-gradient(90deg, #f39c12, #f1c40f)';
  else f.style.background = 'linear-gradient(90deg, #e74c3c, #c0392b)';
}

function showMsg(txt, color, dur = 1300) {
  const m = document.getElementById('msg');
  m.innerHTML = txt; m.style.display = 'block'; m.style.color = color;
  m.style.background = color === '#2ecc71' ? 'rgba(46,204,113,0.2)' : color === '#f1c40f' ? 'rgba(241,196,15,0.18)' : 'rgba(255,50,50,0.2)';
  setTimeout(() => m.style.display = 'none', dur);
}

function addScore(pts, wx, wy) {
  score += pts;
  sfxScore(pts);
  updateUI();
  const wrap = document.getElementById('wrap');
  const scaleX = wrap.clientWidth / 1100;
  const scaleY = (wrap.clientWidth * 520 / 1100) / 520;
  const sx = (wx - camX) * scaleX;
  const sy = wy * scaleY;
  scorePops.push({ x: sx, y: sy, val: '+' + pts, life: 1.0, vy: -1.5 });
  renderScorePops();
}

function renderScorePops() {
  const el = document.getElementById('score-pop');
  if (scorePops.length === 0) { el.style.display = 'none'; return; }
  const last = scorePops[scorePops.length - 1];
  el.style.display = 'block';
  el.style.left = last.x + 'px';
  el.style.top = last.y + 'px';
  el.innerText = last.val;
}

function spawnParticles(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    let a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, life: 1, color });
  }
}

function takeDamage(amount = 25) {
  if (invulnerable > 0) return;
  
  bat = Math.max(0, bat - amount);
  invulnerable = 45;
  shake = 20;
  flash = 15;
  sfxDamage();
  spawnParticles(R.x + 19, R.y + 25, '#ff4444', 12);
  
  if (bat <= 0) {
    vidas--;
    sfxDead();
    spawnParticles(R.x + 19, R.y + 25, '#ff0000', 25);
    showMsg('💀 ¡VIDA PERDIDA! 💀', '#ff4444', 1500);
    
    if (vidas <= 0) {
      stopJungleMusic(); active = false;
      updateUI();
      setTimeout(() => { document.getElementById('hud').style.display = 'none'; titleFr = 0; titleLoop(); }, 900);
      return;
    }
    
    bat = 50;
    R.x = 60; R.y = 200; R.vx = 0; R.vy = 0;
    camX = 0;
  }
  
  updateUI();
}

function onWaterDeath() {
  vidas--;
  sfxDead();
  spawnParticles(R.x + 19, R.y + 25, '#003366', 30);
  showMsg('💧 ¡AHOGADO! 💧', '#3498db', 1500);
  
  if (vidas <= 0) {
    stopJungleMusic(); active = false;
    updateUI();
    setTimeout(() => { document.getElementById('hud').style.display = 'none'; titleFr = 0; titleLoop(); }, 900);
    return;
  }
  
  bat = 50;
  R.x = 60; R.y = 200; R.vx = 0; R.vy = 0;
  camX = 0;
  updateUI();
}

function nextPhase() {
  active = false; stopJungleMusic(); sfxWorkshop();
  showMsg('🏭 ¡TALLER ALCANZADO!<br><span style="font-size:11px">Reparando... ¡Fase ' + (fase + 1) + '!</span>', '#f1c40f', 2400);
  setTimeout(() => {
    fase++; R.x = 60; R.y = 200; R.vx = 0; R.vy = 0; particles = []; scorePops = [];
    buildWorld(fase); updateUI(); active = true; startJungleMusic(); loop();
  }, 2600);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop() { 
  if (!active) return;
  if (isMobile && !isLandscape) return;
  cancelAnimationFrame(raf2); update(); draw(); raf2 = requestAnimationFrame(loop); 
}

function update() {
  if (invulnerable > 0) invulnerable--;
  if (flash > 0) flash--;
  
  if (K['ArrowRight'] || K['KeyD']) { R.vx += R.spd; R.dir = 1; }
  if (K['ArrowLeft'] || K['KeyA']) { R.vx -= R.spd; R.dir = -1; }
  R.vx *= R.fri; R.x += R.vx;
  if ((K['ArrowUp'] || K['Space'] || K['KeyW']) && R.land) { R.vy = -R.jmp; R.land = false; sfxJump(); spawnParticles(R.x + 19, R.y + R.h, '#aaccaa', 6); }
  R.vy += R.grav; R.y += R.vy;
  R.land = false;
  for (let p of platforms) {
    if (R.x + R.w > p.x && R.x < p.x + p.w && R.y + R.h > p.y && R.y + R.h < p.y + 20 && R.vy >= 0) {
      R.y = p.y - R.h; R.vy = 0; R.land = true;
    }
  }
  
  if (R.x < meta.x + meta.w && R.x + R.w > meta.x && R.y < meta.y + meta.h && R.y + R.h > meta.y) nextPhase();

  for (let shark of sharks) {
    shark.x += shark.speed * shark.direction;
    if (shark.x < camX - 300 || shark.x > camX + 1400) {
      shark.direction *= -1;
    }
    shark.finOffset += 0.02;
  }

  for (let i = birds.length - 1; i >= 0; i--) {
    let b = birds[i];
    if (b.hit > 0) b.hit--;
    
    if (b.pattern === 'circle') {
      b.angle += 0.02;
      b.x += Math.cos(b.angle) * 3;
      b.y += Math.sin(b.angle) * 2;
    } else {
      b.x += b.vx;
      b.y += Math.sin(fr * 0.05) * 2;
      if (b.x < camX - 100 || b.x > camX + 1200) b.vx *= -1;
    }
    
    if (R.x < b.x + b.w && R.x + R.w > b.x && R.y < b.y + b.h && R.y + R.h > b.y) {
      if (R.vy > 1.5 && R.y + R.h < b.y + b.h * 0.5) {
        addScore(200, b.x + 20, b.y);
        spawnParticles(b.x + 20, b.y + 15, '#8B4513', 14);
        birds.splice(i, 1);
        sfxStomp();
        R.vy = -10;
      } else if (b.hit === 0) {
        takeDamage(25);
        b.hit = 40;
        sfxBird();
      }
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    let en = enemies[i];
    let spd = en.t === 'bear' ? 1.6 : en.t === 'lion' ? 3.2 : 2.4;
    en.x += spd * en.d; if (en.x > en.lR || en.x < en.lL) en.d *= -1;
    if (en.hit > 0) en.hit--;
    if (R.x < en.x + en.w && R.x + R.w > en.x && R.y < en.y + en.h && R.y + R.h > en.y) {
      if (R.vy > 1.5 && R.y + R.h < en.y + en.h * 0.55 + 6) {
        const pts = POINTS[en.t] || 100;
        spawnParticles(en.x + 23, en.y + 22, { boar: '#8B5E3C', snake: '#2d8c3c', lion: '#c17f24', bear: '#5d4037' }[en.t] || '#888', 16);
        addScore(pts, en.x + 23, en.y);
        enemies.splice(i, 1); sfxStomp(); R.vy = -10;
      } else if (en.hit === 0) { 
        takeDamage(25);
        en.hit = 50; 
        R.x += R.dir < 0 ? 95 : -95;
      }
    }
  }

  for (let b of batteries) {
    b.bob += 0.08;
    if (!b.got && R.x < b.x + 20 && R.x + R.w > b.x && R.y < b.y + 26 && R.y + R.h > b.y) {
      b.got = true; bat = Math.min(100, bat + 25);
      sfxBattery(); spawnParticles(b.x + 10, b.y + 13, '#f1c40f', 12);
      if (bat >= 100) { 
        if (vidas < 5) vidas++; 
        bat = 100; 
        flash = 55; 
        sfxExtraLife(); 
        showMsg('⚡ ¡BATERÍA LLENA! +VIDA ⚡', '#2ecc71', 1600); 
      }
      updateUI();
    }
  }

  for (let pl of plants) {
    pl.shootTimer--;
    if (pl.openTimer > 0) { pl.openTimer--; pl.open = pl.openTimer > 0; }
    if (pl.shootTimer <= 0) {
      pl.shootTimer = pl.shootInterval;
      pl.open = true; pl.openTimer = 25;
      const dist = Math.abs((pl.x + 15) - (R.x + 19));
      if (dist < 500) {
        const dx = (R.x + 19) - (pl.x + 15);
        const dy = (R.y + 25) - (pl.y + 10);
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        sfxProjectile();
        projectiles.push({ x: pl.x + 15, y: pl.y + 5, vx: (dx / len) * 3.8, vy: (dy / len) * 3.8, life: 1, type: 'plant' });
      }
    }
    if (R.x < pl.x + pl.w && R.x + R.w > pl.x && R.y < pl.y + pl.h && R.y + R.h > pl.y) {
      if (R.vy > 1.5 && R.y + R.h < pl.y + pl.h * 0.4) {
        R.vy = -8;
      }
    }
  }

  for (let fi of fires) {
    fi.frame++;
    if (R.x < fi.x + fi.w - 4 && R.x + R.w > fi.x + 4 && R.y + R.h > fi.y + 8 && R.y < fi.y + fi.h) {
      if (!fi.hit || fi.hit <= 0) { 
        sfxFire(); 
        takeDamage(20);
        fi.hit = 60; 
      }
    }
    if (fi.hit > 0) fi.hit--;
  }

  for (let i = projectiles.length - 1; i >= 0; i--) {
    let pr = projectiles[i];
    pr.x += pr.vx; pr.y += pr.vy; pr.life -= 0.008;
    if (pr.life <= 0 || pr.x < camX - 50 || pr.x > camX + 1150 || pr.y > 550 || pr.y < -20) {
      projectiles.splice(i, 1); continue;
    }
    if (R.x < pr.x + 8 && R.x + R.w > pr.x - 8 && R.y < pr.y + 8 && R.y + R.h > pr.y - 8) {
      spawnParticles(pr.x, pr.y, '#7bed3a', 8);
      projectiles.splice(i, 1);
      takeDamage(25);
    }
  }

  for (let i = scorePops.length - 1; i >= 0; i--) {
    scorePops[i].y += scorePops[i].vy; scorePops[i].life -= 0.025;
    if (scorePops[i].life <= 0) scorePops.splice(i, 1);
  }
  if (scorePops.length > 0) renderScorePops();
  else document.getElementById('score-pop').style.display = 'none';

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  camX = R.x - 270; if (camX < 0) camX = 0;
  
  if (R.y > 545) { 
    onWaterDeath(); 
  }
  fr++;
}

// ── DIBUJO ────────────────────────────────────────────────────────────────────
function drawRobot() {
  const rx = R.x, ry = R.y, walkCycle = R.land && Math.abs(R.vx) > 0.5 ? Math.sin(fr * 0.4) * 7 : 0;
  
  ctx.save();
  if (invulnerable > 0 && (Math.floor(fr / 5) % 2 === 0)) {
    ctx.globalAlpha = 0.5;
  }
  
  ctx.fillStyle = '#546e7a'; ctx.fillRect(rx + 14, ry - 16, 5, 12);
  ctx.fillStyle = '#ff1744'; ctx.beginPath(); ctx.arc(rx + 16, ry - 19, 6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,23,68,0.35)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(rx + 16, ry - 19, 10, 0, Math.PI * 2); ctx.stroke();
  const grad = ctx.createLinearGradient(rx, ry, rx + R.w, ry);
  grad.addColorStop(0, '#78909c'); grad.addColorStop(0.5, '#b0bec5'); grad.addColorStop(1, '#78909c');
  ctx.fillStyle = grad; roundRect(ctx, rx, ry, R.w, R.h - 14, 7); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(rx + 4, ry + 24, R.w - 8, 2); ctx.fillRect(rx + 4, ry + 30, R.w - 8, 2);
  ctx.fillStyle = '#0d47a1'; roundRect(ctx, rx + 6, ry + 6, R.w - 12, 14, 4); ctx.fill();
  ctx.fillStyle = '#00e5ff'; for (let i = 0; i < 3; i++) ctx.fillRect(rx + 9 + i * 9, ry + 11, 6, 5);
  ctx.fillStyle = 'rgba(0,229,255,0.25)'; roundRect(ctx, rx + 6, ry + 6, R.w - 12, 14, 4); ctx.fill();

    { ox: 0, sc: 1.0, col1: '#ff6f00', col2: 'rgba(255,111,0,0)', ph: 0 },
    { ox: -5, sc: 0.75, col1: '#ff8f00', col2: 'rgba(255,143,0,0)', ph: 1.5 },
    { ox: 7, sc: 0.65, col1: '#ffca28', col2: 'rgba(255,202,40,0)', ph: 0.8 },
    { ox: 2, sc: 0.85, col1: '#ff3d00', col2: 'rgba(255,61,0,0)', ph: 2.2 },
  ];
  for (let fl of flames) {
    const wave = Math.sin(t * 0.18 + fl.ph) * 4;
    const h = 28 * fl.sc;

    const grad = ctx.createRadialGradient(cx2, y + 28 - h * 0.3, 2, cx2, y + 28, h * 0.7);

    ctx.quadraticCurveTo(cx2 + 12 * fl.sc, y + 28 - h * 0.5, cx2 + 10 * fl.sc, y + 28);
    ctx.fill();

  for (let i = 0; i < 3; i++) {

  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y); c.closePath();
}

  ctx.save();

  ctx.fillStyle = '#0a1f0a';

  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  for (let cl of clouds) { let cx2 = (cl.x - camX * 0.25 + 7000) % 1120; ctx.beginPath(); ctx.ellipse(cx2, cl.y, cl.w, 16, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx2 + 22, cl.y - 12, cl.w * 0.6, 13, 0, 0, Math.PI * 2); ctx.fill(); }

  ctx.save(); ctx.translate(-camX, 0);

  ctx.restore();

  ctx.fillStyle = wg; ctx.fillRect(camX, 458, 1100, 62);

  for (let i = 0; i < 10; i++) { let wx = camX + i * 120 + (Math.sin(fr * 0.04 + i) * 22); ctx.fillRect(wx, 463 + Math.sin(fr * 0.05 + i) * 4, 80, 3); }
  
  sharks.forEach(shark => drawShark(shark));
  
  for (let f of fish) {

  }

  ctx.save(); ctx.translate(-camX, 0);

  });

  drawRobot();

  for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3.5 * p.life, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;

  if (flash > 0) { ctx.fillStyle = `rgba(255,50,50,${flash / 40})`; ctx.fillRect(R.x - 28, 0, R.w + 56, 520); }
  ctx.restore(); ctx.restore();
}

cvs.addEventListener('click', () => { if (!active) start(); });
titleLoop();

setTimeout(() => {
  checkOrientation();
  resize();
}, 100);
</script>
</body>
</html>
