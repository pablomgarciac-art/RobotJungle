<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Jungle - Mobile & PC</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Desactivar zoom y selecciones para que no molesten al jugar en móvil */
        * { touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; overflow: hidden; background: #050a05; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: linear-gradient(#1e3c72 0%, #4facfe 100%); border: 6px solid #1a331a; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.9); max-width: 95vw; max-height: 80vh; }
        
        #ui-overlay { position: absolute; width: 800px; height: 400px; pointer-events: none; }
        .stats { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 10px; text-shadow: 2px 2px #000; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; border: 1px solid #4caf50; }
        .pantalla-completa { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: #fff; text-align: center; pointer-events: auto; }
        .mensaje-aviso { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); text-align: center; font-size: 18px; font-weight: bold; pointer-events: none; display: none; z-index: 10; }
        .parpadeo { animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 50% { opacity: 0; } }

        /* Estilos específicos para los botones móviles */
        #controles-movil { position: fixed; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 25px; box-sizing: border-box; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 24px; pointer-events: auto; }
        .btn:active { background: rgba(255,255,255,0.5); }
        
        /* Solo mostrar los botones si es una pantalla táctil o pequeña */
        @media (max-width: 900px), (pointer: coarse) {
            #controles-movil { display: flex; }
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="hud" class="stats" style="display: none;">
        ❤️ VIDAS: <span id="v">3</span> | 🔋 BATERÍA: <span id="b">0</span>% | 📍 <span id="fase-txt">FASE 1</span>
    </div>
    
    <div id="msg-dano" class="mensaje-aviso" style="color: #ff4444; text-shadow: 3px 3px #000;">¡ROBOT ESCACHARRADO!</div>
    <div id="msg-vida" class="mensaje-aviso" style="color: #2ecc71; text-shadow: 3px 3px #000;">¡VIDA EXTRA!</div>
    <div id="msg-meta" class="mensaje-aviso" style="color: #f1c40f; text-shadow: 3px 3px #000;">¡TALLER ALCANZADO!<br><br><span style="font-size:10px">REPARANDO... FASE SIGUIENTE</span></div>

    <div id="inicio" class="pantalla-completa" onclick="iniciarJuego()">
        <h1 style="color: #f1c40f; font-size: 24px; margin-bottom: 20px;">ROBOT JUNGLE</h1>
        <p style="font-size: 8px; line-height: 2;">LLEGA AL TALLER PARA REPARARTE</p>
        <p class="parpadeo" style="margin-top: 30px; color: #2ecc71;">PULSA O TOCA PARA EMPEZAR</p>
    </div>
</div>

<div id="controles-movil">
    <div style="display: flex; gap: 20px;">
        <div id="btnIzq" class="btn">◀</div>
        <div id="btnDer" class="btn">▶</div>
    </div>
    <div id="btnSalto" class="btn" style="background: rgba(76, 175, 80, 0.4);">UP</div>
</div>

<canvas id="canvas"></canvas>

<script>
const cvs = document.getElementById("canvas");
const ctx = cvs.getContext("2d");
cvs.width = 800; cvs.height = 400;

const teclas = {}; // Movido arriba para asegurar disponibilidad
let juegoActivo = false;
let frames = 0;
let camX = 0;
let vidas = 3;
let bateria = 0;
let faseActual = 1;
let shakeFrames = 0;
let flashVerde = 0;

const robot = {
    x: 50, y: 300, w: 35, h: 45,
    vx: 0, vy: 0,
    velocidad: 0.8,
    friccion: 0.85,
    salto: 13,
    gravedad: 0.6,
    enSuelo: false
};

let plataformas = [], enemigos = [], baterias = [], nubes = [], peces = [], meta = {x: 0, y: 0, w: 100, h: 120};

// --- LOGICA DE CONTROLES ---
window.addEventListener("keydown", e => {
    teclas[e.code] = true;
    if(e.code === "Enter" && !juegoActivo) iniciarJuego();
});
window.addEventListener("keyup", e => teclas[e.code] = false);

// Vincular botones de pantalla a las "teclas" lógicas
const configurarBoton = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); teclas[key] = true; });
    el.addEventListener("touchend", (e) => { e.preventDefault(); teclas[key] = false; });
};
configurarBoton("btnIzq", "ArrowLeft");
configurarBoton("btnDer", "ArrowRight");
configurarBoton("btnSalto", "ArrowUp");
// ---------------------------

function crearMundo(fase) {
    const largo = 2500 + (fase * 1000);
    plataformas = [{x: 0, y: 350, w: 600}];
    enemigos = [];
    baterias = [];
    
    let xCurr = 700;
    while(xCurr < largo) {
        let gap = 100 + Math.random() * 100;
        let w = 200 + Math.random() * 300;
        let y = 250 + Math.random() * 100;
        plataformas.push({x: xCurr, y: y, w: w});
        
        if(Math.random() > 0.5) baterias.push({x: xCurr + w/2, y: y-40, recolectada: false});
        if(Math.random() > 0.6) {
            let tipo = Math.random() > 0.5 ? 'jabali' : 'serpiente';
            enemigos.push({x: xCurr + 50, y: y-35, w: 40, h: 35, d: 1, limiteL: xCurr, limiteR: xCurr+w-40, tipo: tipo});
        }
        xCurr += w + gap;
    }

    let ultimaP = plataformas[plataformas.length - 1];
    meta.x = ultimaP.x + ultimaP.w - 120;
    meta.y = ultimaP.y - meta.h;

    nubes = []; peces = [];
    for(let i=0; i<15; i++) {
        nubes.push({x: Math.random()*largo, y: Math.random()*100, v: 0.5 + Math.random()});
        peces.push({x: Math.random()*largo, y: 375, v: 1 + Math.random()});
    }
}

function iniciarJuego() {
    if(juegoActivo) return;
    juegoActivo = true; vidas = 3; bateria = 0; camX = 0; faseActual = 1;
    robot.x = 50; robot.y = 100; robot.vx = 0; robot.vy = 0;
    crearMundo(faseActual);
    document.getElementById("inicio").style.display = "none";
    document.getElementById("hud").style.display = "block";
    actualizarUI();
    bucle();
}

function actualizarUI() {
    document.getElementById("v").innerText = vidas;
    document.getElementById("b").innerText = bateria;
    document.getElementById("fase-txt").innerText = "FASE " + faseActual;
}

function activarDano() {
    shakeFrames = 30;
    document.getElementById("msg-dano").style.display = "block";
    setTimeout(() => document.getElementById("msg-dano").style.display = "none", 1000);
    vidas--; 
    actualizarUI();
    robot.vx = 0;
    if(vidas <= 0) setTimeout(() => location.reload(), 1000);
}

function pasarFase() {
    juegoActivo = false;
    document.getElementById("msg-meta").style.display = "block";
    setTimeout(() => {
        faseActual++;
        document.getElementById("msg-meta").style.display = "none";
        robot.x = 50; robot.y = 100; robot.vx = 0; robot.vy = 0;
        crearMundo(faseActual);
        actualizarUI();
        juegoActivo = true;
        bucle();
    }, 2000);
}

function actualizar() {
    if(!juegoActivo) return;

    if (teclas["ArrowRight"]) robot.vx += robot.velocidad;
    if (teclas["ArrowLeft"]) robot.vx -= robot.velocidad;
    robot.vx *= robot.friccion;
    robot.x += robot.vx;

    if ((teclas["ArrowUp"] || teclas["Space"]) && robot.enSuelo) {
        robot.vy = -robot.salto;
        robot.enSuelo = false;
    }
    robot.vy += robot.gravedad;
    robot.y += robot.vy;

    robot.enSuelo = false;
    plataformas.forEach(p => {
        if (robot.x + robot.w > p.x && robot.x < p.x + p.w &&
            robot.y + robot.h > p.y && robot.y + robot.h < p.y + 20 && robot.vy >= 0) {
            robot.y = p.y - robot.h; robot.vy = 0; robot.enSuelo = true;
        }
    });

    if (robot.x < meta.x + meta.w && robot.x + robot.w > meta.x && robot.y < meta.y + meta.h && robot.y + robot.h > meta.y) {
        pasarFase();
    }

    enemigos.forEach(en => {
        en.x += 2 * en.d;
        if(en.x > en.limiteR || en.x < en.limiteL) en.d *= -1;
        if(robot.x < en.x + en.w && robot.x + robot.w > en.x && robot.y < en.y + en.h && robot.y + robot.h > en.y) {
            if(robot.vy > 0) {
                enemigos.splice(enemigos.indexOf(en), 1); robot.vy = -10;
            } else {
                activarDano();
                robot.x -= 120;
            }
        }
    });

    baterias.forEach(b => {
        if(!b.recolectada && robot.x < b.x + 20 && robot.x + robot.w > b.x && robot.y < b.y + 20 && robot.y + robot.h > b.y) {
            b.recolectada = true;
            bateria += 20;
            if(bateria >= 100) { 
                vidas++; bateria = 0; flashVerde = 40;
                document.getElementById("msg-vida").style.display = "block";
                setTimeout(() => document.getElementById("msg-vida").style.display = "none", 1500);
            }
            actualizarUI();
        }
    });

    camX = robot.x - 200;
    if(camX < 0) camX = 0;
    if(robot.y > 400) { activarDano(); robot.y = 0; robot.x -= 150; }
    frames++;
}

function dibujar() {
    ctx.save();
    if(shakeFrames > 0) {
        ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        shakeFrames--;
    }

    ctx.clearRect(0, 0, cvs.width, cvs.height);

    ctx.fillStyle = "rgba(255,255,255,0.6)";
    nubes.forEach(n => {
        let nx = (n.x - camX * 0.3) % (plataformas[plataformas.length-1].x + 1000);
        ctx.beginPath(); ctx.arc(nx, n.y, 20, 0, 7); ctx.arc(nx+15, n.y-10, 20, 0, 7); ctx.fill();
    });

    let wave = Math.sin(frames * 0.05) * 5;
    ctx.fillStyle = "#003366";
    ctx.fillRect(0, 370 + wave, cvs.width, 50);

    ctx.translate(-camX, 0);

    ctx.fillStyle = "#455a64"; ctx.fillRect(meta.x, meta.y, meta.w, meta.h);
    ctx.fillStyle = "#263238"; ctx.fillRect(meta.x + 20, meta.y + 40, 60, 80);
    ctx.fillStyle = frames % 20 < 10 ? "red" : "maroon"; 
    ctx.beginPath(); ctx.arc(meta.x + 50, meta.y + 20, 8, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "8px 'Press Start 2P'"; ctx.fillText("TALLER", meta.x + 15, meta.y - 10);

    plataformas.forEach(p => {
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(p.x, p.y, p.w, 10);
        ctx.fillStyle = "#3e2723"; ctx.fillRect(p.x, p.y+10, p.w, 400);
    });

    baterias.forEach(b => {
        if(!b.recolectada) {
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x, b.y, 20, 25);
            ctx.fillStyle = "#fff"; ctx.fillText("+", b.x+5, b.y+18);
        }
    });

    enemigos.forEach(en => {
        if(en.tipo === 'jabali') {
            ctx.fillStyle = "#4e342e"; ctx.beginPath(); ctx.ellipse(en.x+20, en.y+20, 22, 15, 0, 0, 7); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.fillRect(en.d>0?en.x+35:en.x-5, en.y+20, 10, 4);
        } else {
            ctx.fillStyle = "#1b5e20";
            for(let i=0; i<6; i++) {
                ctx.beginPath(); ctx.arc(en.x + (i*8), en.y + 10 + Math.sin(frames*0.15 + i)*5, 7-i, 0, 7); ctx.fill();
            }
        }
    });

    // Robot con antena roja original y visor
    let walk = Math.sin(frames * 0.3) * 10;
    ctx.fillStyle = "#90a4ae"; ctx.fillRect(robot.x, robot.y, robot.w, robot.h-10);
    ctx.fillStyle = "#00e5ff"; ctx.fillRect(robot.x+18, robot.y+8, 12, 6);
    ctx.fillStyle = "#37474f";
    ctx.fillRect(robot.x+4, robot.y+35, 9, 10 + (Math.abs(robot.vx)>0.5?walk:0));
    ctx.fillRect(robot.x+22, robot.y+35, 9, 10 - (Math.abs(robot.vx)>0.5?walk:0));
    // Antena Roja recuperada
    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(robot.x+10, robot.y-5, 4, 0, 7); ctx.fill();

    if(flashVerde > 0) {
        ctx.fillStyle = `rgba(46, 204, 113, ${flashVerde/40})`;
        ctx.fillRect(robot.x - 20, 0, robot.w + 40, 400);
        flashVerde--;
    }

    ctx.restore();
}

function bucle() {
    actualizar();
    dibujar();
    if(juegoActivo) requestAnimationFrame(bucle);
}
</script>
</body>
</html>
