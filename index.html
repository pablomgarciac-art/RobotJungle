<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050a05; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 700px; overflow: hidden; }
#wrap { position: relative; width: 100%; max-width: 1100px; }
#c { display: block; width: 100%; height: auto; border: 3px solid #1a331a; border-radius: 8px; box-shadow: 0 0 40px rgba(0,200,100,0.15); }
#hud { position: absolute; top: 10px; left: 10px; right: 10px; display: none; pointer-events: none; justify-content: space-between; align-items: flex-start; }
.hud-box { background: rgba(0,0,0,0.55); border: 1px solid rgba(100,220,120,0.4); border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 10px; line-height: 1.8; }
#barra-bat { width: 90px; height: 7px; background: #333; border-radius: 3px; margin-top: 3px; }
#fill-bat { height: 7px; border-radius: 3px; background: #2ecc71; width: 0%; transition: width 0.2s, background 0.3s; }
.overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.82); color: #fff; text-align: center; border-radius: 6px; }
.overlay h1 { font-size: 30px; color: #f1c40f; letter-spacing: 3px; margin-bottom: 8px; }
.overlay p { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 15px; font-weight: bold; pointer-events: none; display: none; text-align: center; text-shadow: 2px 2px #000; border-radius: 6px; padding: 8px 16px; white-space: nowrap; }
#ctrl { position: absolute; bottom: 10px; left: 0; right: 0; display: none; justify-content: space-between; padding: 0 16px; }
.btn { width: 64px; height: 64px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 20px; pointer-events: auto; }
@media (pointer: coarse) { #ctrl { display: flex !important; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud" style="display:none;flex-direction:row;">
    <div class="hud-box">❤️ <span id="vidas">3</span> &nbsp;|&nbsp; 🏆 FASE <span id="fase">1</span></div>
    <div class="hud-box" style="text-align:right;">🔋 <span id="bpct">0</span>%<div id="barra-bat"><div id="fill-bat"></div></div></div>
  </div>
  <div id="overlay" class="overlay">
    <h1>ROBOT JUNGLE</h1>
    <p style="color:#2ecc71;font-size:14px;margin:8px 0 4px;">El robot perdido en la selva</p>
    <p style="color:#aaa;font-size:10px;">← → mover &nbsp;|&nbsp; ↑ / Space saltar &nbsp;|&nbsp; pisa a los enemigos</p>
    <br>
    <p class="blink" style="color:#f1c40f;font-size:12px;cursor:pointer;" onclick="start()">[ PULSA ENTER O TOCA AQUÍ ]</p>
  </div>
  <div id="msg"></div>
  <div id="ctrl">
    <div style="display:flex;gap:12px;"><div class="btn" id="bL">◀</div><div class="btn" id="bR">▶</div></div>
    <div class="btn" id="bU">▲</div>
  </div>
</div>

<script>
const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
cvs.width = 1100; cvs.height = 520;

const K = {}, setupBtn = (id, key) => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); K[key] = true; }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); K[key] = false; }, {passive:false});
};
setupBtn('bL','ArrowLeft'); setupBtn('bR','ArrowRight'); setupBtn('bU','ArrowUp');
window.addEventListener('keydown', e => { K[e.code] = true; if(e.code==='Enter' && !active) start(); });
window.addEventListener('keyup', e => K[e.code] = false);
document.getElementById('overlay').addEventListener('click', start);

let active=false, fr=0, camX=0, vidas=3, bat=0, fase=1;
let shake=0, flash=0, particles=[], stars=[];
const R = { x:60, y:250, w:38, h:50, vx:0, vy:0, spd:0.95, fri:0.83, jmp:13.5, grav:0.6, land:false, dir:1, frame:0 };
let platforms=[], enemies=[], batteries=[], clouds=[], fish=[], meta={x:0,y:0,w:100,h:125};

for(let i=0;i<80;i++) stars.push({x:Math.random()*3500, y:Math.random()*150, s:Math.random()*1.8+0.5, t:Math.random()*Math.PI*2});

function buildWorld(f) {
  const L = 3000 + f*1000;
  platforms = [{x:0,y:430,w:720,type:'grass'}];
  enemies=[]; batteries=[];
  let cx = 800;
  while(cx < L) {
    let gap=100+Math.random()*120, w=200+Math.random()*320, y=290+Math.random()*110;
    let type = Math.random()>0.5?'grass':'stone';
    platforms.push({x:cx, y, w, type});
    if(Math.random()>0.4) batteries.push({x:cx+w/2-10, y:y-50, got:false, bob:Math.random()*Math.PI*2});
    if(Math.random()>0.55) {
      let t = Math.random()>0.5?'boar':'snake';
      enemies.push({x:cx+60, y:y-42, w:44, h:42, d:1, lL:cx, lR:cx+w-46, t, hp:1, hit:0});
    }
    cx += w + gap;
  }
  let lp = platforms[platforms.length-1];
  meta.x = lp.x+lp.w-110; meta.y = lp.y-meta.h;
  clouds=[]; fish=[];
  for(let i=0;i<22;i++) clouds.push({x:Math.random()*L, y:20+Math.random()*100, s:0.4+Math.random()*0.6, w:70+Math.random()*50});
  for(let i=0;i<25;i++) fish.push({x:Math.random()*L, y:455+Math.random()*15, v:0.9+Math.random()*1.3, s:Math.random()>0.5?1:-1});
}

function start() {
  active=true; vidas=3; bat=0; camX=0; fase=1;
  R.x=60; R.y=200; R.vx=0; R.vy=0; particles=[];
  buildWorld(fase);
  document.getElementById('overlay').style.display='none';
  document.getElementById('hud').style.display='flex';
  updateUI(); loop();
}

function updateUI() {
  document.getElementById('vidas').innerText = vidas;
  document.getElementById('fase').innerText = fase;
  document.getElementById('bpct').innerText = bat;
  const f = document.getElementById('fill-bat');
  f.style.width = bat+'%';
  f.style.background = bat>=80?'#f1c40f':bat>=50?'#2ecc71':'#3498db';
}

function showMsg(txt, color, dur=1200) {
  const m = document.getElementById('msg');
  m.innerHTML = txt; m.style.display='block'; m.style.color=color;
  m.style.background = color==='#2ecc71'?'rgba(46,204,113,0.2)':'rgba(255,50,50,0.2)';
  setTimeout(()=>m.style.display='none', dur);
}

function spawnParticles(x, y, color, n=12) {
  for(let i=0;i<n;i++) {
    let a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:1, color});
  }
}

function onDamage() {
  shake=25; spawnParticles(R.x+19, R.y+25, '#ff4444', 16);
  showMsg('¡ESCACHARRADO!', '#ff4444');
  vidas--; updateUI(); R.vx=0;
  if(vidas<=0) {
    active=false;
    setTimeout(()=>{
      const ov = document.getElementById('overlay');
      ov.innerHTML='<h1 style="color:#e74c3c">GAME OVER</h1><p style="color:#aaa;margin:12px 0">El robot no lo logró...</p><br><p class="blink" style="color:#f1c40f;font-size:12px;cursor:pointer;" onclick="start()">[ REINTENTAR ]</p>';
      ov.style.display='flex';
    }, 800);
  }
}

function nextPhase() {
  active=false;
  showMsg('🏭 TALLER ALCANZADO!<br><span style="font-size:10px">Reparando... fase '+(fase+1)+'</span>', '#f1c40f', 2200);
  setTimeout(()=>{
    fase++; R.x=60; R.y=200; R.vx=0; R.vy=0; particles=[];
    buildWorld(fase); updateUI(); active=true; loop();
  }, 2300);
}

let raf;
function loop() {
  if(!active) return;
  cancelAnimationFrame(raf);
  update(); draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  if(K['ArrowRight']||K['KeyD']) { R.vx+=R.spd; R.dir=1; }
  if(K['ArrowLeft']||K['KeyA']) { R.vx-=R.spd; R.dir=-1; }
  R.vx *= R.fri;
  R.x += R.vx;
  if((K['ArrowUp']||K['Space']||K['KeyW'])&&R.land) { R.vy=-R.jmp; R.land=false; spawnParticles(R.x+19, R.y+R.h, '#aaccaa', 6); }
  R.vy += R.grav; R.y += R.vy;
  R.land = false;
  for(let p of platforms) {
    if(R.x+R.w>p.x&&R.x<p.x+p.w&&R.y+R.h>p.y&&R.y+R.h<p.y+20&&R.vy>=0) {
      R.y=p.y-R.h; R.vy=0; R.land=true;
    }
  }
  if(R.land&&Math.abs(R.vx)>0.5) R.frame=(R.frame+1)%12; else if(!R.land) R.frame=0;
  if(R.x<meta.x+meta.w&&R.x+R.w>meta.x&&R.y<meta.y+meta.h&&R.y+R.h>meta.y) nextPhase();
  for(let i=enemies.length-1;i>=0;i--) {
    let en=enemies[i];
    en.x+=2.4*en.d; if(en.x>en.lR||en.x<en.lL) en.d*=-1;
    if(en.hit>0) en.hit--;
    if(R.x<en.x+en.w&&R.x+R.w>en.x&&R.y<en.y+en.h&&R.y+R.h>en.y) {
      if(R.vy>1.5&&R.y+R.h<en.y+en.h*0.55+6) {
        spawnParticles(en.x+22, en.y+20, en.t==='boar'?'#8B5E3C':'#2d8c3c', 14);
        enemies.splice(i,1); R.vy=-10;
      } else if(en.hit===0) { onDamage(); en.hit=40; R.x+=R.dir<0?90:-90; }
    }
  }
  for(let b of batteries) {
    b.bob+=0.08;
    if(!b.got&&R.x<b.x+20&&R.x+R.w>b.x&&R.y<b.y+24&&R.y+R.h>b.y) {
      b.got=true; bat=Math.min(100,bat+20);
      spawnParticles(b.x+10, b.y+12, '#f1c40f', 10);
      if(bat>=100) { vidas++; bat=0; flash=50; showMsg('⚡ VIDA EXTRA!', '#2ecc71'); }
      updateUI();
    }
  }
  for(let i=particles.length-1;i>=0;i--) {
    let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.032;
    if(p.life<=0) particles.splice(i,1);
  }
  camX = R.x - 260; if(camX<0) camX=0;
  if(R.y>540) { onDamage(); R.y=0; R.x-=130; }
  fr++;
}

function drawRobot() {
  const rx=R.x, ry=R.y, d=R.dir;
  const walkCycle = R.land&&Math.abs(R.vx)>0.5 ? Math.sin(fr*0.4)*7 : 0;
  ctx.fillStyle='#546e7a'; ctx.fillRect(rx+14, ry-16, 5, 12);
  ctx.beginPath(); ctx.arc(rx+16, ry-19, 6, 0, Math.PI*2);
  ctx.fillStyle='#ff1744'; ctx.fill();
  ctx.strokeStyle='rgba(255,23,68,0.35)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(rx+16, ry-19, 10, 0, Math.PI*2); ctx.stroke();
  const grad = ctx.createLinearGradient(rx, ry, rx+R.w, ry);
  grad.addColorStop(0,'#78909c'); grad.addColorStop(0.5,'#b0bec5'); grad.addColorStop(1,'#78909c');
  ctx.fillStyle=grad; roundRect(ctx, rx, ry, R.w, R.h-14, 7); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(rx+4, ry+24, R.w-8, 2); ctx.fillRect(rx+4, ry+30, R.w-8, 2);
  ctx.fillStyle='#0d47a1'; roundRect(ctx, rx+6, ry+6, R.w-12, 14, 4); ctx.fill();
  ctx.fillStyle='#00e5ff';
  for(let i=0;i<3;i++) ctx.fillRect(rx+9+i*9, ry+11, 6, 5);
  ctx.fillStyle='rgba(0,229,255,0.25)'; roundRect(ctx, rx+6, ry+6, R.w-12, 14, 4); ctx.fill();
  ctx.fillStyle='#546e7a'; ctx.fillRect(rx-8, ry+9, 8, 20); ctx.fillRect(rx+R.w, ry+9, 8, 20);
  ctx.fillStyle='#455a64';
  roundRect(ctx, rx+4, ry+R.h-16, 12, 16+walkCycle, 3); ctx.fill();
  roundRect(ctx, rx+R.w-16, ry+R.h-16, 12, 16-walkCycle, 3); ctx.fill();
  ctx.fillStyle='#37474f';
  ctx.fillRect(rx+2, ry+R.h+walkCycle, 14, 6);
  ctx.fillRect(rx+R.w-16, ry+R.h-walkCycle, 14, 6);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(rx+R.w/2, ry+R.h+8, 20, 6, 0, 0, Math.PI*2); ctx.fill();
}

function drawBoar(en) {
  const x=en.x, y=en.y, d=en.d, run=Math.sin(fr*0.25)*5;
  ctx.fillStyle='#5d4037'; ctx.beginPath(); ctx.ellipse(x+22, y+20, 22, 15, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#795548'; ctx.beginPath(); ctx.ellipse(x+(d>0?33:11), y+15, 11, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  if(d>0) { ctx.fillRect(x+39, y+18, 9, 5); ctx.fillRect(x+41, y+16, 6, 4); }
  else { ctx.fillRect(x-4, y+18, 9, 5); ctx.fillRect(x-2, y+16, 6, 4); }
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(x+(d>0?38:6), y+14, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#4e342e';
  ctx.fillRect(x+7, y+32, 8, 9+run); ctx.fillRect(x+29, y+32, 8, 9-run);
  ctx.fillRect(x+16, y+32, 8, 9-run); ctx.fillRect(x+23, y+32, 8, 9+run);
}

function drawSnake(en) {
  const x=en.x, y=en.y;
  for(let i=7;i>=0;i--) {
    const t = fr*0.15+i*0.45;
    const sx = x+i*6+(en.d<0?42-i*6:0);
    const sy = y+16+Math.sin(t)*6;
    const r = i===0?10:8.5-i*0.6;
    ctx.fillStyle = i%2===0?'#2e7d32':'#388e3c';
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    if(i===0) {
      ctx.fillStyle='#f9a825'; ctx.beginPath(); ctx.arc(sx+(en.d>0?5:-5), sy-2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#e53935'; ctx.fillRect(sx+(en.d>0?10:-4), sy+2, 7, 3);
    }
  }
}

function drawWorkshop() {
  const mx=meta.x, my=meta.y;
  ctx.fillStyle='#37474f'; roundRect(ctx, mx, my, meta.w, meta.h, 5); ctx.fill();
  ctx.fillStyle='#263238'; roundRect(ctx, mx+14, my+50, 72, 75, 4); ctx.fill();
  ctx.fillStyle='#546e7a'; ctx.fillRect(mx, my+62, meta.w, 11);
  ctx.fillStyle='#00b0ff'; ctx.fillRect(mx+20, my+58, 22, 22); ctx.fillRect(mx+56, my+58, 22, 22);
  ctx.fillStyle='rgba(0,176,255,0.18)'; ctx.fillRect(mx+20, my+58, 22, 22); ctx.fillRect(mx+56, my+58, 22, 22);
  ctx.fillStyle = fr%20<10?'#f44336':'#b71c1c';
  ctx.beginPath(); ctx.arc(mx+50, my+20, 10, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(244,67,54,0.35)'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(mx+50, my+20, 17, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle='#90a4ae'; ctx.font='7px Courier New'; ctx.textAlign='center';
  ctx.fillText('TALLER', mx+meta.w/2, my-8);
  ctx.textAlign='left';
  ctx.fillStyle='#78909c';
  for(let i=0;i<4;i++) ctx.fillRect(mx+3+i*26, my, 5, 16);
}

function drawPlatform(p) {
  if(p.type==='stone') {
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y+24);
    g.addColorStop(0,'#90a4ae'); g.addColorStop(1,'#546e7a');
    ctx.fillStyle=g; roundRect(ctx, p.x, p.y, p.w, 16, 3); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.13)';
    for(let i=0;i<p.w;i+=34) ctx.fillRect(p.x+i, p.y, 32, 5);
  } else {
    ctx.fillStyle='#388e3c'; roundRect(ctx, p.x, p.y, p.w, 12, 4); ctx.fill();
    ctx.fillStyle='#2e7d32'; ctx.fillRect(p.x, p.y+9, p.w, 7);
    ctx.fillStyle='#4caf50';
    for(let i=0;i<p.w;i+=18) {
      ctx.beginPath(); ctx.moveTo(p.x+i, p.y);
      ctx.quadraticCurveTo(p.x+i+9, p.y-9, p.x+i+18, p.y); ctx.fill();
    }
    ctx.fillStyle='#3e2723'; ctx.fillRect(p.x, p.y+12, p.w, 80);
  }
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x+r, y);
  c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function draw() {
  ctx.save();
  if(shake>0) { ctx.translate((Math.random()-0.5)*9,(Math.random()-0.5)*9); shake--; }
  const sky = ctx.createLinearGradient(0,0,0,520);
  sky.addColorStop(0,'#0d1b0e'); sky.addColorStop(0.5,'#1b4a1b'); sky.addColorStop(1,'#0a2e0a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,1100,520);
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let s of stars) {
    let sx = (s.x - camX*0.08 + 4000) % 1100;
    let flicker = 0.5+0.5*Math.sin(fr*0.05+s.t);
    ctx.globalAlpha = flicker*0.7;
    ctx.beginPath(); ctx.arc(sx, s.y, s.s, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  let moonX = (400 - camX*0.05 + 9000) % 1100;
  ctx.fillStyle='#fff9c4'; ctx.beginPath(); ctx.arc(moonX, 65, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#1b4a1b'; ctx.beginPath(); ctx.arc(moonX+10, 60, 21, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a1f0a';
  for(let i=0;i<35;i++) {
    let tx = ((i*105 - camX*0.2)+10000)%1150 - 50;
    let th = 90+Math.sin(i*1.3)*60;
    ctx.beginPath(); ctx.moveTo(tx, 520); ctx.lineTo(tx, 390-th);
    ctx.quadraticCurveTo(tx+22, 335-th, tx+44, 390-th);
    ctx.lineTo(tx+44, 520); ctx.fill();
  }
  ctx.fillStyle='#122b12';
  for(let i=0;i<24;i++) {
    let tx = ((i*150 - camX*0.45)+7000)%1200 - 55;
    let th = 70+Math.sin(i*2.1)*40;
    ctx.beginPath(); ctx.moveTo(tx, 520); ctx.lineTo(tx+12, 430-th);
    ctx.quadraticCurveTo(tx+34, 390-th, tx+56, 430-th);
    ctx.lineTo(tx+68, 520); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.07)';
  for(let cl of clouds) {
    let cx2 = (cl.x - camX*0.25 + 7000)%1120;
    ctx.beginPath(); ctx.ellipse(cx2, cl.y, cl.w, 16, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+22, cl.y-12, cl.w*0.6, 13, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.save(); ctx.translate(-camX, 0);
  const wg = ctx.createLinearGradient(0,458,0,520);
  wg.addColorStop(0,'#003366'); wg.addColorStop(1,'#001a33');
  ctx.fillStyle=wg; ctx.fillRect(camX, 458, 1100, 62);
  ctx.fillStyle='rgba(100,180,255,0.11)';
  for(let i=0;i<10;i++) {
    let wx = camX+i*120+(Math.sin(fr*0.04+i)*22);
    ctx.fillRect(wx, 463+Math.sin(fr*0.05+i)*4, 80, 3);
  }
  for(let f of fish) {
    f.x += f.v*f.s;
    if(f.x>camX+1200) f.x=camX-20;
    if(f.x<camX-20) f.x=camX+1200;
    ctx.fillStyle='rgba(100,180,255,0.5)';
    ctx.save(); ctx.translate(f.x, f.y); if(f.s<0) ctx.scale(-1,1);
    ctx.beginPath(); ctx.ellipse(0,0,7,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(-12,5); ctx.lineTo(-12,-5); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  ctx.save(); ctx.translate(-camX, 0);
  platforms.forEach(p => drawPlatform(p));
  drawWorkshop();
  for(let b of batteries) {
    if(!b.got) {
      b.bob+=0.05;
      const by2 = b.y+Math.sin(b.bob)*5;
      ctx.fillStyle='#f57f17'; roundRect(ctx, b.x, by2, 20, 30, 3); ctx.fill();
      ctx.fillStyle='#fdd835'; ctx.fillRect(b.x+6, by2-5, 9, 6);
      ctx.fillStyle='#fff176'; for(let i=0;i<3;i++) ctx.fillRect(b.x+5, by2+5+i*7, 11, 4);
      ctx.strokeStyle='rgba(255,235,59,0.45)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(b.x+10, by2+15, 16, 0, Math.PI*2); ctx.stroke();
    }
  }
  enemies.forEach(en => {
    ctx.globalAlpha = en.hit>0?0.5:1;
    if(en.t==='boar') drawBoar(en); else drawSnake(en);
    ctx.globalAlpha=1;
  });
  drawRobot();
  for(let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3.5*p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  if(flash>0) {
    ctx.fillStyle=`rgba(46,204,113,${flash/60})`;
    ctx.fillRect(R.x-28, 0, R.w+56, 520);
    flash--;
  }
  ctx.restore();
  ctx.restore();
}
</script>
